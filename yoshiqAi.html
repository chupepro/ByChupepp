<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>YoshiqAI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0d1117;--s2:#111827;--s3:#1a2235;
  --border:#1f2d42;--b2:#2a3d58;
  --sky:#38bdf8;--cyan:#22d3ee;--text:#e2e8f0;--muted:#64748b;--m2:#475569;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Space Grotesk',sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;min-height:54px;flex-shrink:0;background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);z-index:100}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:34px;height:34px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,#38bdf8,#0284c7,#6366f1);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#fff;box-shadow:0 0 14px rgba(56,189,248,.3)}
.logo-name{font-size:14px;font-weight:700;letter-spacing:-.02em;line-height:1}
.logo-sub{font-size:8px;color:var(--sky);font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:5px}
.pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:99px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);font-size:8px;font-weight:700;color:#34d399;letter-spacing:.1em;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.pdot{width:5px;height:5px;border-radius:50%;background:#34d399;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.web-pill{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:99px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);font-size:8px;font-weight:700;color:#818cf8;letter-spacing:.06em;font-family:'JetBrains Mono',monospace;white-space:nowrap;cursor:pointer;transition:all .15s}
.web-pill:hover{background:rgba(99,102,241,.2)}
.web-pill.off{color:var(--muted);border-color:var(--border);background:transparent}
.web-dot{width:5px;height:5px;border-radius:50%;background:#818cf8;flex-shrink:0}
.web-pill.off .web-dot{background:var(--m2)}
.ibtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;position:relative}
.ibtn:hover{color:var(--text);border-color:var(--b2);background:var(--s2)}
.ibtn:active{transform:scale(.88)}
/* memory badge count */
.mem-count{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:#a78bfa;color:#fff;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;border:1px solid var(--bg)}

/* LAYOUT */
@media(min-width:640px){
  .body-area{display:flex;flex:1;overflow:hidden}
  aside{width:218px;flex-shrink:0;border-right:1px solid var(--border);background:rgba(13,17,23,.6);display:flex;flex-direction:column;overflow:hidden}
  .aside-hdr{padding:9px 12px;border-bottom:1px solid var(--border);font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
  #model-list{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:3px}
  .mc{padding:9px 11px;border-radius:9px;border:1px solid transparent;cursor:pointer;transition:all .16s}
  .mc:hover{background:var(--s3);border-color:var(--border)}
  .mc.active{background:rgba(56,189,248,.07);border-color:rgba(56,189,248,.3)}
  .mc.exclusive.active{background:rgba(251,191,36,.05);border-color:rgba(251,191,36,.3)}
  .mc:active{transform:scale(.97)}
  section{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
}
@media(max-width:639px){
  .body-area{display:flex;flex-direction:column;flex:1;overflow:hidden}
  aside{flex-shrink:0;background:rgba(7,9,15,.98);border-bottom:1px solid var(--border)}
  .aside-hdr{display:none}
  #model-list{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:8px 10px;gap:7px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  #model-list::-webkit-scrollbar{display:none}
  .mc{flex:0 0 118px;padding:8px 10px;border-radius:9px;border:1px solid var(--border);cursor:pointer;background:var(--s1);scroll-snap-align:start;transition:all .14s}
  .mc.active{background:rgba(56,189,248,.07);border-color:rgba(56,189,248,.35)}
  .mc.exclusive.active{background:rgba(251,191,36,.05);border-color:rgba(251,191,36,.3)}
  .mc:active{transform:scale(.93)}
  section{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-height:0}
}

/* MODEL CARD */
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.mc-name{font-size:11px;font-weight:600;line-height:1.2;flex:1;padding-right:3px}
.mc-badge{font-size:7px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:2px 5px;border-radius:4px;background:rgba(56,189,248,.1);color:var(--sky);white-space:nowrap;flex-shrink:0}
.mc.exclusive .mc-badge{background:rgba(251,191,36,.12);color:#fbbf24}
.mc-bar{height:2px;background:var(--border);border-radius:99px;overflow:hidden}
.mc-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--cyan));border-radius:99px}
.mc.exclusive .mc-fill{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.mc-iq{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px}
.mc-tags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.mc-tag{font-size:7px;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.15)}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;padding-bottom:115px;-webkit-overflow-scrolling:touch}
@media(min-width:640px){#chat{padding:22px;padding-bottom:128px}}

/* WELCOME */
#welcome{margin:auto;text-align:center;padding:20px 16px;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:11px}
.w-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(99,102,241,.1));border:1px solid rgba(56,189,248,.15);display:flex;align-items:center;justify-content:center}
#welcome h2{font-size:21px;font-weight:700;letter-spacing:-.03em}
#welcome h2 b{background:linear-gradient(90deg,var(--sky),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
#welcome p{font-size:12px;color:var(--muted);line-height:1.6;max-width:280px}
.w-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.w-tag{padding:3px 9px;border-radius:99px;font-size:9px;font-family:'JetBrains Mono',monospace;background:var(--s2);border:1px solid var(--border);color:var(--m2)}

/* MESSAGES */
.row{display:flex;animation:up .2s ease-out both}
.row.user{justify-content:flex-end}
.row.ai,.row.err,.row.rl{justify-content:flex-start}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.bubble{max-width:84%;padding:10px 13px;border-radius:13px;font-size:13px;line-height:1.65;word-break:break-word;user-select:text}
@media(min-width:640px){.bubble{max-width:73%;font-size:14px}}
.bubble.user{background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;border-bottom-right-radius:3px;box-shadow:0 3px 14px rgba(14,165,233,.2);white-space:pre-wrap}
.bubble.ai{background:var(--s2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:3px}
.bubble.err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);color:#fca5a5;border-bottom-left-radius:3px;white-space:pre-wrap}

/* RATE LIMIT bubble */
.bubble.rl{
  background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.2);
  border-bottom-left-radius:3px;text-align:center;padding:18px 16px;
}
.rl-emoji{font-size:28px;margin-bottom:8px}
.rl-title{font-weight:700;font-size:14px;color:#fde68a;margin-bottom:6px}
.rl-sub{font-size:12px;color:#fcd34d;margin-bottom:12px;line-height:1.5}
.rl-clock{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:10px 18px;display:inline-block}
.rl-clock-label{font-size:9px;color:#fbbf24;font-family:'JetBrains Mono',monospace;letter-spacing:.12em;margin-bottom:4px}
.rl-clock-time{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fde68a}
.rl-note{font-size:11px;color:#92642a;margin-top:10px}

.msg-img{max-width:100%;border-radius:8px;margin-bottom:7px;display:block;border:1px solid rgba(255,255,255,.1)}

.web-notice{display:flex;align-items:center;gap:5px;margin-bottom:8px;padding:4px 9px;border-radius:6px;background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.18);font-size:9px;font-family:'JetBrains Mono',monospace;color:#818cf8}
.web-notice b{color:#a5b4fc}

/* MEMORY PANEL */
#mem-panel{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
}
#mem-panel.show{display:flex}
.mem-sheet{
  width:100%;max-width:500px;max-height:70vh;
  background:var(--s1);border:1px solid var(--b2);
  border-radius:18px 18px 0 0;padding:18px 16px 28px;
  display:flex;flex-direction:column;gap:12px;
  animation:slideup .2s ease-out;
}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.mem-hdr{display:flex;align-items:center;justify-content:space-between}
.mem-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.mem-title span{font-size:18px}
.mem-close{background:var(--s3);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .14s}
.mem-close:hover{color:var(--text)}
.mem-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;min-height:40px}
.mem-item{
  display:flex;align-items:flex-start;gap:8px;
  background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;
}
.mem-item-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.mem-item-text{font-size:12px;color:var(--text);flex:1;line-height:1.45}
.mem-item-del{background:none;border:none;color:var(--m2);cursor:pointer;font-size:14px;flex-shrink:0;padding:0 2px;transition:color .14s}
.mem-item-del:hover{color:#f87171}
.mem-empty{font-size:12px;color:var(--muted);text-align:center;padding:18px 0;font-style:italic}
.mem-foot{display:flex;gap:8px}
.mem-btn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:11px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .14s}
.mem-btn:hover{color:var(--text);border-color:var(--b2)}
.mem-btn.danger:hover{color:#f87171;border-color:rgba(239,68,68,.3)}

/* MARKDOWN */
.md-body{user-select:text}
.md-body p{margin-bottom:.55em}
.md-body p:last-child{margin-bottom:0}
.md-body strong{color:#e2e8f0;font-weight:700}
.md-body em{color:#94a3b8;font-style:italic}
.md-body h1,.md-body h2,.md-body h3{font-weight:700;margin:.7em 0 .35em;color:#f1f5f9;letter-spacing:-.01em}
.md-body h1{font-size:1.15em}.md-body h2{font-size:1.05em}.md-body h3{font-size:.97em}
.md-body ul,.md-body ol{padding-left:1.3em;margin:.4em 0}
.md-body li{margin:.2em 0}
.md-body code{font-family:'JetBrains Mono',monospace;font-size:.82em;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.15);border-radius:4px;padding:1px 5px;color:#7dd3fc}
.md-body pre{background:rgba(0,0,0,.4);border:1px solid var(--b2);border-radius:8px;padding:10px 12px;overflow-x:auto;margin:.5em 0}
.md-body pre code{background:none;border:none;padding:0;color:#93c5fd;font-size:.8em}
.md-body blockquote{border-left:3px solid var(--sky);padding-left:10px;color:var(--muted);margin:.4em 0;font-style:italic}
.md-body a{color:var(--sky);text-decoration:underline;text-underline-offset:2px}
.md-body hr{border:none;border-top:1px solid var(--border);margin:.6em 0}
.md-body table{border-collapse:collapse;width:100%;margin:.5em 0;font-size:.85em}
.md-body th,.md-body td{border:1px solid var(--border);padding:5px 9px;text-align:left}
.md-body th{background:var(--s3);font-weight:600}
.katex{font-size:1em!important}
.katex-display{margin:.6em 0;overflow-x:auto}
.katex-err{font-family:'JetBrains Mono',monospace;font-size:.8em;color:#f87171;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:4px;padding:2px 6px;display:inline-block;max-width:100%;overflow-x:auto}

.blbl{font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.4;margin-bottom:4px}
.bfoot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.05)}
.bmodel{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cpybtn{font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;transition:all .14s;font-family:'Space Grotesk',sans-serif;flex-shrink:0;margin-left:8px}
.cpybtn:hover{color:var(--text);border-color:var(--sky)}
.sysmsg{text-align:center;font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--m2);letter-spacing:.12em;text-transform:uppercase;padding:2px}

/* TYPING */
#typing{position:absolute;bottom:97px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:7px;padding:6px 13px;border-radius:20px;background:rgba(13,17,23,.97);border:1px solid var(--b2);backdrop-filter:blur(12px);font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--sky);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;box-shadow:0 5px 20px rgba(0,0,0,.4);z-index:50}
#typing.show{display:flex}
.dots{display:flex;gap:3px}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--sky);animation:dot .85s infinite}
.dots span:nth-child(2){animation-delay:.14s}
.dots span:nth-child(3){animation-delay:.28s}
@keyframes dot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* INPUT */
#inp-area{position:absolute;bottom:0;left:0;right:0;padding:6px 11px 11px;background:linear-gradient(to top,var(--bg) 55%,transparent);z-index:40}
@media(min-width:640px){#inp-area{padding:8px 18px 14px}}
#img-preview-wrap{display:none;margin-bottom:6px;position:relative;width:fit-content}
#img-preview{height:54px;border-radius:8px;border:1px solid var(--b2);display:block}
#img-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#ef4444;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;line-height:1}
.ibox{display:flex;align-items:flex-end;gap:7px;background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:6px 6px 6px 12px;transition:border-color .18s,box-shadow .18s}
.ibox:focus-within{border-color:rgba(56,189,248,.42);box-shadow:0 0 0 3px rgba(56,189,248,.05)}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;line-height:1.5;resize:none;max-height:95px;padding:3px 0}
textarea::placeholder{color:var(--m2)}
#img-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
#img-btn:hover{color:var(--sky);border-color:rgba(56,189,248,.4)}
#img-btn.has-img{color:var(--sky);border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.07)}
#img-file{display:none}
#sbtn{width:36px;height:36px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,#38bdf8,#0ea5e9);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .16s;box-shadow:0 3px 10px rgba(56,189,248,.25)}
#sbtn:hover{transform:scale(1.07)}
#sbtn:active{transform:scale(.88)}
#sbtn:disabled{opacity:.22;cursor:not-allowed;transform:none;box-shadow:none}
.ihint{display:flex;justify-content:space-between;align-items:center;margin-top:5px;padding:0 1px;font-size:9px;color:var(--m2);font-family:'JetBrains Mono',monospace}
#mbadge{padding:2px 7px;border-radius:4px;background:var(--s1);border:1px solid var(--border);color:var(--sky);font-size:8px;font-weight:700;letter-spacing:.04em;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">Y</div>
      <div>
        <div class="logo-name">YoshiqAI</div>
        <div class="logo-sub">Free Router</div>
      </div>
    </div>
    <div class="hdr-r">
      <div class="pill"><span class="pdot"></span>ONLINE</div>
      <div class="web-pill" id="web-toggle" title="Веб-поиск вкл/выкл">
        <span class="web-dot"></span><span id="web-label">WEB</span>
      </div>
      <!-- Memory button -->
      <button class="ibtn" id="mem-btn" title="Память ИИ">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
        <span class="mem-count" id="mem-count" style="display:none">0</span>
      </button>
      <button class="ibtn" id="reset-btn" title="Очистить чат">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>
  </header>

  <!-- MEMORY PANEL -->
  <div id="mem-panel">
    <div class="mem-sheet">
      <div class="mem-hdr">
        <div class="mem-title"><span>🧠</span> Память ИИ</div>
        <button class="mem-close" id="mem-close">✕</button>
      </div>
      <div class="mem-list" id="mem-list"></div>
      <div class="mem-foot">
        <button class="mem-btn danger" id="mem-clear-all">Очистить всё</button>
        <button class="mem-btn" id="mem-close2">Закрыть</button>
      </div>
    </div>
  </div>

  <div class="body-area">
    <aside>
      <div class="aside-hdr">Модели</div>
      <div id="model-list"></div>
    </aside>
    <section>

async function doWebSearch(query){
  try{
    const url=`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.duckduckgo.com/?q='+encodeURIComponent(query)+'&format=json&no_html=1&skip_disambig=1')}`;
    const res=await fetch(url,{signal:AbortSignal.timeout(6000)});
    const raw=await res.json();
    const d=JSON.parse(raw.contents);
    const parts=[];
    if(d.Answer) parts.push('Ответ: '+d.Answer);
    if(d.AbstractText) parts.push(d.AbstractText);
    if(d.RelatedTopics) d.RelatedTopics.slice(0,5).forEach(t=>{if(t.Text)parts.push('• '+t.Text);});
    return parts.length?parts.join('\n'):`По "${query}" прямых результатов нет. Используй свои знания.`;
  }catch(e){
    return `Веб-поиск недоступен. Используй свои знания. Запрос: "${query}"`;
  }
}

// Проверяем — не вернул ли ответ сырой XML вместо текста
function looksLikeToolXML(txt){
  return txt && (
    txt.includes('<function=') ||
    txt.includes('<parameter=') ||
    txt.includes('<tool_call>') ||
    /^\s*<[a-z_]+=/.test(txt)
  );
}

async function tryModel(modelId, messages, useWeb){
  const body={model:modelId,messages,max_tokens:2000,temperature:0.8};
  if(useWeb) body.tools=[WEB_TOOL];
  const res=await fetch(`${BASE}/chat/completions`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${KEY}`,'HTTP-Referer':location.href,'X-Title':'YoshiqAI'},
    body:JSON.stringify(body)
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(err?.error?.message||`HTTP ${res.status}`);
  }
  const data=await res.json();
  const choice=data?.choices?.[0];
  if(!choice) throw new Error('Пустой ответ');
  if(choice.finish_reason==='tool_calls'||choice.message?.tool_calls?.length){
    return{txt:null,model:modelId,toolCalls:choice.message.tool_calls,rawMsg:choice.message};
  }
  const txt=choice.message?.content;
  if(!txt) throw new Error('Пустой ответ');
  // Если модель вернула сырой XML вызова функции — считаем это ошибкой
  if(looksLikeToolXML(txt)) throw new Error('Модель вернула XML вместо текста');
  return{txt,model:modelId,toolCalls:null};
}

function getResetTime(){
  const now=new Date();
  const reset=new Date(now);
  reset.setHours(reset.getHours()+1,0,0,0);
  return String(reset.getHours()).padStart(2,'0')+':'+String(reset.getMinutes()).padStart(2,'0');
}

async function sendWithFallback(messages, useWeb, hasImage, onTry){
  const pool=buildPool(hasImage);
  const errs=[];
  let rateLimitCount=0;
  let noVisionCount=0;

  for(let i=0;i<pool.length;i++){
    const m=pool[i];
    onTry(m,i+1,pool.length);
    try{
      const result=await tryModel(m,messages,useWeb);
      // tool call — делаем поиск и отправляем результат
      if(result.toolCalls&&result.toolCalls.length>0){
        const tc=result.toolCalls[0];
        let query='';
        try{query=JSON.parse(tc.function.arguments).query;}catch(e){}
        ttEl.textContent=`🌐 ${query.slice(0,30)}…`;
        const searchResult=await doWebSearch(query);
        const msgs2=[...messages,result.rawMsg,{role:'tool',tool_call_id:tc.id,content:searchResult}];
        const r2=await tryModel(m,msgs2,false);
        if(r2.txt) return{txt:r2.txt,model:m,usedWeb:true,searchQuery:query};
        throw new Error('Нет текста после поиска');
      }
      if(result.txt) return{txt:result.txt,model:m,usedWeb:false};
      throw new Error('Нет текста');
    }catch(e){
      const msg=e.message||'';
      if(msg.includes('free-models-per-day')||msg.toLowerCase().includes('rate limit')) rateLimitCount++;
      if(msg.includes('image input')||msg.includes('vision')) noVisionCount++;
      errs.push(`${m.split('/').pop()}: ${msg.slice(0,55)}`);
      if(i<pool.length-1) await new Promise(r=>setTimeout(r,180));
    }
  }

  // Если большинство — рейт-лимит
  if(rateLimitCount>=Math.ceil(pool.length*0.4)){
    throw new Error('__RATELIMIT__'+getResetTime());
  }
  // Если изображение — но не нашлось vision-моделей
  if(hasImage&&noVisionCount>=Math.ceil(pool.length*0.5)){
    throw new Error('Не нашлось модели, поддерживающей изображения. Попробуй позже.');
  }

  throw new Error(`Все ${pool.length} моделей недоступны.\n\n${errs.slice(0,5).join('\n')}`);
}

// ── KaTeX SAFE RENDER ──
function applyKatex(el){
  const walk=node=>{
    if(node.nodeType===3){
      const text=node.textContent;
      if(!text.includes('$')) return;
      const frag=document.createDocumentFragment();
      let last=0;
      const re=/\$\$([\s\S]*?)\$\$|\$([^$\n]+?)\$/g;
      let m;
      while((m=re.exec(text))!==null){
        if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));
        const expr=m[1]!==undefined?m[1]:m[2];
        const display=m[1]!==undefined;
        const span=document.createElement('span');
        try{
          katex.render(expr.trim(),span,{throwOnError:true,displayMode:display,output:'html'});
        }catch(err){
          span.className='katex-err';
          span.textContent=(display?'$$':'$')+expr+(display?'$$':'$');
        }
        frag.appendChild(span);
        last=m.index+m[0].length;
      }
      if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      if(last>0) node.parentNode.replaceChild(frag,node);
    }else if(node.nodeType===1){
      if(['CODE','PRE','SCRIPT','STYLE'].includes(node.tagName)) return;
      Array.from(node.childNodes).forEach(walk);
    }
  };
  walk(el);
}

  if(usedWeb&&searchQuery){
    const wn=document.createElement('div');wn.className='web-notice';
    wn.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>&nbsp;Поиск: <b>${searchQuery}</b>`;
    bubble.appendChild(wn);
  }

  const body=document.createElement('div');
  if(isU||isErr){
    body.textContent=text;
  }else{
    body.className='md-body';
    body.innerHTML=marked.parse(text);
    body.querySelectorAll('a').forEach(a=>{a.target='_blank';a.rel='noopener noreferrer';});
    requestAnimationFrame(()=>applyKatex(body));
  }
  bubble.appendChild(body);

  if(!isU&&!isErr){
    const foot=document.createElement('div');foot.className='bfoot';
    const bm=document.createElement('span');bm.className='bmodel';bm.textContent=short;
    const cpybtn=document.createElement('button');cpybtn.className='cpybtn';cpybtn.textContent='Копировать';
    cpybtn.onclick=()=>navigator.clipboard.writeText(text).catch(()=>{});
    foot.appendChild(bm);foot.appendChild(cpybtn);bubble.appendChild(foot);
  }
  row.appendChild(bubble);chatEl.appendChild(row);scroll();
}

function scroll(){chatEl.scrollTo({top:chatEl.scrollHeight,behavior:'smooth'});}

async function send(){
  const val=inpEl.value.trim();
  const img=attachedImage;
  if((!val&&!img)||sbtnEl.disabled)return;

  const displayText=val||(img?'[фото]':'');
  const imgDataUrl=img?img.dataUrl:null;
  inpEl.value='';inpEl.style.height='auto';
  clearImage();

  addMsg('user',displayText,null,false,null,imgDataUrl);

  let userContent;
  if(img){
    userContent=[
      {type:'image_url',image_url:{url:`data:${img.mimeType};base64,${img.base64}`}},
      {type:'text',text:val||'Опиши это изображение подробно.'}
    ];
  }else{
    userContent=val;
  }

  hist.push({role:'user',content:userContent});
  sbtnEl.disabled=true;typEl.classList.add('show');ttEl.textContent='Поиск модели…';

  // Строим системный промпт с памятью
  const sysWithMem = cur.sys + memoryContext();
  const msgs=[{role:'system',content:sysWithMem},...hist.slice(-14)];
  const useWeb=webEnabled&&cur.id!=='q'&&!img;
  const hasImage=!!img;

  try{
    const{txt,model,usedWeb,searchQuery}=await sendWithFallback(msgs,useWeb,hasImage,(m,i,t)=>{
      ttEl.textContent=hasImage?`📷 Анализ (${i}/${t})…`:`Пробую ${i}/${t}…`;
    });
    typEl.classList.remove('show');
    addMsg('assistant',txt,model,usedWeb,searchQuery);
    hist.push({role:'assistant',content:txt});
    // Фоновое извлечение фактов о пользователе
    if(val&&cur.id!=='q') extractMemory(val, txt);
  }catch(e){
    typEl.classList.remove('show');
    addMsg('err',e.message,null);
  }finally{
    sbtnEl.disabled=false;
    if(window.innerWidth>640)inpEl.focus();
  }
}

sbtnEl.onclick=send;
inpEl.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
inpEl.oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,95)+'px';};
rBtn.onclick=()=>{
  if(!confirm('Очистить чат?'))return;
  hist=[];clearImage();
  chatEl.innerHTML='<div id="welcome" style="margin:auto;text-align:center;padding:20px 16px;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:11px"><div class="w-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><h2 style="font-size:21px;font-weight:700">Yoshiq<b style="background:linear-gradient(90deg,#38bdf8,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent">AI</b></h2><p style="font-size:12px;color:#64748b;line-height:1.6">Чат очищен!</p></div>';
};

renderModels();
mbEl.textContent=cur.name;
updateWebUI();
updateMemBadge();
loadFreeModels();
if(window.innerWidth>640)inpEl.focus();
</script>
</body>
</html>
